    required: true
    provider: github-actions
    workflow_names:
      - zdp-design-system
    required_status_checks:
      - zdp-design-system / check
    missing_reason: null
    private_dependency_token_required: false
    required_secrets: []
  dependency_updates:
    renovate_enabled: false
    dependabot_enabled: false
    conflict_policy: manual dependency review until package release automation is adopted
  ruleset:
    required: false
    required_status_checks: []
    admin_bypass_policy: null
  release_helper:
    enabled: false
    version_source_of_truth: package.json
    changelog_policy: manual changelog until package release automation is adopted
  auto_merge:
    enabled: false
    required_checks: []
    owner_review_required: true
    major_update_allowed: false
  stale_bot:
    enabled: false
    exempt_labels:
      - security
      - privacy
      - design-system
    security_issue_auto_close_allowed: false
  templates:
    issue_forms_secret_warning: false
    pr_template_secret_warning: false
    forbidden_submission_classes:
      - secrets
      - customer raw data
      - product-specific business rules

reliability:
  rpo: null
  rto: null
  slo_availability: null
  slo_latency_p95_ms: null
  night_page: false
  backup_required: false
  restore_drill_required: false
  status_page_required: false
  queue_replay_policy: null

policy_gates:
  required_linter_rules:
    - ZDP-SERVICE-SCHEMA-004
    - ZDP-REF-009

human_review_required:
  - public package release
  - breaking token or component API change

exit:
  success_criteria:
    - web, app, lab, and game surfaces can share token names without product-specific forks
    - UI package changes are reviewable before consumers adopt them
    - term explanation surfaces can preserve stable term_id identity without moving glossary manifest, locale, routing, or ad decisions into the design package
  kill_criteria:
    - product-specific screens or business rules move into the design package
  sunset_plan: null
  owner: 0disoft
  review_at: null
  user_notice_days: null
  data_export_window_days: null
  dependency_removal_checklist: []

notes:
  - This repository starts as a package boundary, not as a full component implementation.
  - service.id must be registered in zdp-architecture/catalogs/services.yaml before repository validation.
  - TermSheet keeps stable term_id data attributes and data-zdp-ad-exclude while glossary source, localization, routing, analytics, and ad-supported detail pages remain consumer-owned.
