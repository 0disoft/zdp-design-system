name: Publish npm package

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify release credential
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::NPM_TOKEN repository secret is required for npm publish."
            exit 1
          fi

      - name: Verify tagged commit is on main
        run: |
          if ! git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "::error::Release tag must point to a commit contained in origin/main."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag
        run: |
          package_version="$(node -p "require('./package.json').version")"
          expected_tag="v${package_version}"
          if [ "$GITHUB_REF_NAME" != "$expected_tag" ]; then
            echo "::error::Release tag ${GITHUB_REF_NAME} does not match package.json version ${package_version}."
            exit 1
          fi

      - name: Verify package
        run: bun run check

      - name: Verify package contents
        run: npm pack --dry-run --json

      - name: Check npm registry state
        id: npm_state
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "${package_name}@${package_version} is already published."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.npm_state.outputs.already_published != 'true'
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Verify npm registry result
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          max_attempts=12
          attempt=1

          while [ "$attempt" -le "$max_attempts" ]; do
            published_version="$(npm view "${package_name}@${package_version}" version 2>/dev/null || true)"
            if [ "$published_version" = "$package_version" ]; then
              npm view "${package_name}@${package_version}" dist.tarball
              exit 0
            fi

            echo "npm version ${published_version:-unavailable} does not match package.json version ${package_version}; retrying (${attempt}/${max_attempts})."
            sleep 5
            attempt=$((attempt + 1))
          done

          echo "::error::npm did not expose ${package_name}@${package_version} after ${max_attempts} attempts."
          exit 1

      - name: Write release notes
        run: |
          node --input-type=commonjs <<'NODE' > release-notes.md
          const fs = require("node:fs");
          const version = JSON.parse(fs.readFileSync("package.json", "utf8")).version;
          const changelog = fs.readFileSync("CHANGELOG.md", "utf8").replace(/\r\n/g, "\n");
          const escapedVersion = version.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          const startMatch = changelog.match(new RegExp(`^##\\s+${escapedVersion}\\b.*$`, "m"));
          if (!startMatch || startMatch.index === undefined) {
            throw new Error(`CHANGELOG.md does not contain a ${version} release section.`);
          }
          const start = startMatch.index;
          const next = changelog.slice(start + startMatch[0].length).search(/^##\s+/m);
          const end = next === -1 ? changelog.length : start + startMatch[0].length + next;
          process.stdout.write(changelog.slice(start, end).trim() + "\n");
          NODE

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            echo "Release ${GITHUB_REF_NAME} already exists."
            exit 0
          fi

          gh release create "$GITHUB_REF_NAME" \
            --verify-tag \
            --title "$GITHUB_REF_NAME" \
            --notes-file release-notes.md
